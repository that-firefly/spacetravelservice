{% extends "layouts/main.html" %}

{% block pageTitle %}
  What is your estimated property income this tax year?
{% endblock %}

{% block content %}
<h1 class="govuk-heading-l">What is your estimated property income this tax year?</h1>

<form method="post" action="/mtd/property-income-answer">

  <div class="govuk-form-group">
    <label class="govuk-label" for="income">Enter income in pounds</label>
    <input class="govuk-input" id="income" name="income" type="number">
  </div>

  <button class="govuk-button" type="submit">Continue</button>
</form>

{% endblock %}
